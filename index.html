<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Walker Web Studios designs custom websites for small businesses with character — restaurants, retail, trades. Modern build, honest pricing." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>Walker Web Studios — Custom websites for businesses with character</title>
  </head>
  <body>
    <div id="root"></div>

    <!--
      Hidden static form for Netlify Forms detection at build time.
      The visible form in src/pages/Home.jsx is React-rendered, so Netlify can't
      see it during the build crawl. This stub gives Netlify the schema it needs
      to register the form and route submissions to the dashboard.
    -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="business" />
      <textarea name="message"></textarea>
    </form>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
